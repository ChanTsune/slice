name: test
on:
  pull_request:
  push:
jobs:
  rust_doc_test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: git autocrlf false
        if: startsWith(matrix.os, 'windows')
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-cargo
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: ./.github/actions/setup-rust
      - name: Cache build
        id: cache-build
        uses: actions/cache@v5
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ runner.arch }}-rust-${{ hashFiles('**/Cargo.toml') }}
      - name: run test
        run: cargo test --locked --release
        env:
          RUST_BACKTRACE: 1
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Resolve MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"(.+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/cache-cargo
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: ./.github/actions/setup-rust
        with:
          channel: ${{ steps.msrv.outputs.version }}
      - name: run test
        run: cargo test --locked
        env:
          RUST_BACKTRACE: 1
