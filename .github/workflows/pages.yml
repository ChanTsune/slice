name: pages
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - xtask/**
      - src/cli.rs
      - README.md
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      # docs/index.html is gitignored, so it must be regenerated from the SSOT
      # (docs/cheatsheet.toml) before the artifact is uploaded.
      - name: Generate docs/index.html
        run: cargo xtask gen
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
