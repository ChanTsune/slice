name: release
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    outputs:
      slice_version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
      # Generate (and stage) the assets before publishing the release, so a
      # build/generation failure leaves no asset-less release behind.
      - name: Generate completions and man page
        run: |
          cargo build --release
          mkdir -p complete doc
          ./target/release/slice --generate complete-bash > complete/slice.bash
          ./target/release/slice --generate complete-zsh > complete/_slice
          ./target/release/slice --generate complete-fish > complete/slice.fish
          ./target/release/slice --generate complete-powershell > complete/_slice.ps1
          ./target/release/slice --generate man > doc/slice.1
      - name: Upload completions and man page
        uses: actions/upload-artifact@v7
        with:
          name: assets
          path: |
            complete/
            doc/
      - name: Create GitHub release
        id: release
        uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          token: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: build-release
    needs: ['create-release']
    runs-on: ${{ matrix.os }}
    env:
      # For some builds, we use cross to compile for targets the host
      # runner can't build natively; they opt in via `cross` in the matrix.
      CARGO: cargo
      # When CARGO is set to CROSS, this is set to `--target matrix.target`.
      TARGET_FLAGS: ""
      # When CARGO is set to CROSS, TARGET_DIR includes matrix.target.
      TARGET_DIR: ./target
      # Emit backtraces on panics.
      RUST_BACKTRACE: 1
      # Build static releases with PCRE2.
      PCRE2_SYS_STATIC: 1
    strategy:
      matrix:
        build:
          - linux
          - linux-arm
          - linux-arm64
          - macos
          - macos-arm
          - win-msvc
          # - win-gnu
          - win32-msvc
          - win-arm64-msvc
        include:
        - build: linux
          os: ubuntu-latest
          rust: stable
          target: x86_64-unknown-linux-musl
          cross: true
        - build: linux-arm
          os: ubuntu-latest
          rust: stable
          target: arm-unknown-linux-gnueabihf
          cross: true
        - build: linux-arm64
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-musl
          cross: false
        # macos-15 runners are arm64; x86_64-apple-darwin is a cross-compile
        # through the target added by setup-rust.
        - build: macos
          os: macos-15
          rust: stable
          target: x86_64-apple-darwin
          cross: false
        - build: macos-arm
          os: macos-15
          rust: stable
          target: aarch64-apple-darwin
          cross: false
        - build: win-msvc
          os: windows-latest
          rust: stable
          target: x86_64-pc-windows-msvc
          cross: false
        # - build: win-gnu
        #   os: windows-latest
        #   rust: stable-x86_64-gnu
        #   target: x86_64-pc-windows-gnu
        - build: win32-msvc
          os: windows-latest
          rust: stable
          target: i686-pc-windows-msvc
          cross: false
        - build: win-arm64-msvc
          os: windows-11-arm
          rust: stable
          target: aarch64-pc-windows-msvc
          cross: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: ./.github/actions/setup-rust
      with:
        channel: ${{ matrix.rust }}
        target: ${{ matrix.target }}

    - name: Setup cross
      shell: bash
      if: ${{ matrix.cross }}
      run: |
        cargo install cross
        echo "CARGO=cross" >> $GITHUB_ENV
    - name: Setup musl tools
      shell: bash
      if: ${{ matrix.target == 'aarch64-unknown-linux-musl' }}
      run: sudo apt-get update && sudo apt-get install -y musl-tools
    - name: Setup target flags
      shell: bash
      run: |
        echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
        echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

    - name: Show command used for Cargo
      run: |
        echo "cargo command is: ${{ env.CARGO }}"
        echo "target flag is: ${{ env.TARGET_FLAGS }}"
        echo "target dir is: ${{ env.TARGET_DIR }}"

    - name: Build release binary
      run: ${{ env.CARGO }} build --verbose --release ${{ env.TARGET_FLAGS }}

    - name: Download completions and man page
      uses: actions/download-artifact@v8
      with:
        name: assets

    - name: Build archive
      shell: bash
      run: |
        target="${{ matrix.target }}"
        staging="slice-${{ needs.create-release.outputs.slice_version }}-$target"
        mkdir -p "$staging"/{complete,doc}

        cp {README.md,LICENSE-APACHE,LICENSE-MIT} "$staging/"
        cp complete/* "$staging/complete/"
        cp doc/* "$staging/doc/"

        if [[ "$target" == *-windows-* ]]; then
          cp "target/$target/release/slice.exe" "$staging/"
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> $GITHUB_ENV
        else
          cp "target/$target/release/slice" "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
        fi

    - name: Upload release archive
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.create-release.outputs.slice_version }}
      run: gh release upload "$TAG" "$ASSET" --clobber
