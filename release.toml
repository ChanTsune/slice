publish = false
push = false
tag = false
# The xtask member makes this a multi-package workspace; a consolidated
# commit message can't render {{version}} there (versions aren't shared),
# so commit per package. Only slice-command is released, so it stays one commit.
consolidate-commits = false
# The repo's tags have no `v` prefix (release.yml triggers on bare versions).
tag-name = "{{version}}"
pre-release-commit-message = ":bookmark: Bump version to {{version}}"
# Replacements run in order: rename the Unreleased section/link first, then
# re-insert fresh ones at the markers.
pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [{{version}}] - {{date}}", exactly = 1 },
  { file = "CHANGELOG.md", search = "\\[Unreleased\\]: ", replace = "[{{version}}]: ", exactly = 1 },
  { file = "CHANGELOG.md", search = "\\.\\.\\.HEAD", replace = "...{{version}}", exactly = 1 },
  { file = "CHANGELOG.md", search = "<!-- next-header -->", replace = "<!-- next-header -->\n\n## [Unreleased]", exactly = 1 },
  { file = "CHANGELOG.md", search = "<!-- next-url -->", replace = "<!-- next-url -->\n[Unreleased]: https://github.com/ChanTsune/slice/compare/{{version}}...HEAD", exactly = 1 },
]
